name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      # setup-renv handles:
      #   - installing renv itself
      #   - caching renv/library across runs (keyed on renv.lock)
      #   - calling renv::restore()
      #   - installing system libraries (libcurl-dev, libssl-dev,
      #     libxml2-dev, etc.) via r-lib/actions/setup-r-dependencies
      #     under the hood — this is what fixed the source-build failures
      #     when CI was wired manually.
      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Run testthat suite
        run: Rscript -e 'pkgload::load_all("."); testthat::test_dir("tests/testthat", reporter = "progress", stop_on_failure = TRUE)'
