name: Deploy to production

# Auto-deploys the `prod` branch to sector-in-brief on shinyapps.io
# (https://urban-main.shinyapps.io/sector-in-brief/). The act of
# promoting staging → prod is a deliberate merge:
#
#     git push origin main:prod
#
# or a PR from main into prod. There is no auto-promotion from main.
#
# Setup is identical to deploy-staging.yml (same shinyapps.io account,
# same token pair, same AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY repo
# secrets for the download form — see that workflow's header).
#
# Cutover (ADR 0008 / 0026): prod now points at the PROD download API
# (query-prod) via the SIB_API_* values written into the .Renviron below.
# download_api_config() defaults to the STAGING stack, so these MUST be set
# here or prod would silently call query-stg and hand users staging download
# links. Nothing in R/ changes — it's env-driven. (prod ≡ staging Lambda code:
# byte-identical CodeSha256, both built from sector-in-brief-api main.)
#
# Note: the old prod URL at nccs-urban.shinyapps.io/sector-in-brief/
# is unaffected by this workflow. The migration to urban-main is now
# done (external references + R/text_welcome.R citation point at
# urban-main), so legacy is no longer the cited URL — it is kept live
# as a short-term fallback and will be decommissioned thereafter.

on:
  push:
    branches: [prod]
  workflow_dispatch:

concurrency:
  # SHARED group with deploy-staging.yml: both deploy to the same shinyapps.io
  # account, and two simultaneous deploy sessions 403 each other (a merge-to-
  # main staging deploy overlapping the main->prod promote 403'd the cutover).
  # Sharing serialises staging + prod account-wide. Queue rather than cancel:
  # cancelling a GitHub job does not cancel the shinyapps server-side deploy
  # task, so cancelling would also risk an "HTTP 409: 1 task already in progress".
  group: shinyapps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          # Read into the generated .Renviron below so the download form
          # can sign POST /data at runtime (ADR 0026).
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name   = "urban-main",
              token  = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            # shinyapps.io does not support rsconnect envVars (Connect-only),
            # so ship the invoke creds as a bundled .Renviron — same approach
            # as deploy-staging.yml. Generated from CI secrets; gitignored.
            writeLines(c(
              paste0("AWS_ACCESS_KEY_ID=",     Sys.getenv("AWS_ACCESS_KEY_ID")),
              paste0("AWS_SECRET_ACCESS_KEY=", Sys.getenv("AWS_SECRET_ACCESS_KEY")),
              paste0("AWS_REGION=",            Sys.getenv("AWS_REGION")),
              # Point the download form at the PROD sector-in-brief-api
              # (query-prod). Not secrets — Lambda name + Function URLs; the
              # POST /data invoke is IAM-signed with the same creds, the
              # download URL is the public durable-link base for emailed links.
              "SIB_API_FUNCTION_NAME=sector-in-brief-api-query-prod",
              "SIB_API_DATA_URL=https://qswu3c4w3xi2y5thpr6uhix6ku0jpgwh.lambda-url.us-east-1.on.aws/",
              "SIB_API_DOWNLOAD_URL=https://w6gpdtsy72ua2onypvarfnsjvi0atdkv.lambda-url.us-east-1.on.aws/"
            ), ".Renviron")
            # data/ and renv library excluded for the same reasons as
            # the staging workflow — see deploy-staging.yml comments.
            rsconnect::deployApp(
              appDir      = ".",
              appName     = "sector-in-brief",
              account     = "urban-main",
              forceUpdate = TRUE,
              appFiles = c(
                "app.R",
                "DESCRIPTION",
                "renv.lock",
                ".Rprofile",
                ".Renviron",
                "renv/activate.R",
                "renv/settings.json",
                list.files("R",   full.names = TRUE, recursive = TRUE),
                list.files("www", full.names = TRUE, recursive = TRUE)
              )
            )
          '
